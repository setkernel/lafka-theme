name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ESLint + Stylelint disabled in CI: codebase has pre-existing JS/CSS lint
  # violations. Re-enable after a dedicated cleanup pass — tracked as P5-CS.
  # Run locally with: npm install && npm run lint:js && npm run lint:css

  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # PHPCS disabled in CI: codebase has ~15k+ pre-existing WordPress-Extra
      # violations (mostly tabs-vs-spaces from older contributors). Re-enable
      # after a dedicated codebase-wide phpcbf cleanup pass — tracked as P5-CS.
      # Run locally with: composer phpcs
      - name: PHPUnit
        run: composer test
