name: CI

on:
  # Manual trigger from the Actions UI (re-run on any branch without an empty commit).
  workflow_dispatch:
  push:
    branches: [main, master]
    # Skip CI when only docs / config-only changes land — saves runner minutes
    # and keeps the green-build signal meaningful.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'

# Default to read-only at the workflow level; jobs that need to write
# (none here) must opt in explicitly. Defense in depth against
# compromised actions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-js-css:
    name: ESLint & Stylelint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # Built-in npm cache keyed on package-lock.json hash. Cuts
          # `npm ci` install time from ~30s to ~5s on cache hit.
          cache: npm

      # `npm ci` is a reproducible install (fails on package-lock drift)
      # and is the right choice in CI; `npm install` would silently
      # mutate package-lock.json on lockfile/registry inconsistencies.
      - run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Floor is PHP 8.1 per the plugin/theme headers. 8.4 is the
        # latest stable; 8.3 is the recommended runtime in
        # COMPATIBILITY.md. Drop 8.1 once enough operators have
        # upgraded — it stays in the matrix until then to catch
        # accidental 8.2+ syntax that would break older shared hosts.
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # Composer cache: keyed on composer.lock so installs replay
      # offline when the lock hasn't moved.
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPCS
        run: composer phpcs

      - name: PHPUnit
        run: composer test

  # Lints the workflow YAML itself. Catches typos in step names, unused
  # `needs:` references, broken expressions, and most common GH Actions
  # gotchas before they manifest as red builds.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # Flags any PR that introduces a new vulnerable composer or npm
  # dependency at moderate severity or above. PR-only — push events
  # have nothing to compare against.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # Single status check that all CI jobs pass. Use this in branch
  # protection rules instead of every individual matrix job.
  ci-passed:
    name: CI passed
    needs: [lint-js-css, php, actionlint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          JOBS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$JOBS_FAILED" = "true" ]; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
