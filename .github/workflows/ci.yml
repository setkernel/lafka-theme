name: CI

on:
  # Manual trigger from the Actions UI (re-run on any branch without an empty commit).
  workflow_dispatch:
  push:
    branches: [main, master]
    # Skip CI when only docs / config-only changes land — saves runner minutes
    # and keeps the green-build signal meaningful.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'

# Default to read-only at the workflow level; jobs that need to write
# (none here) must opt in explicitly. Defense in depth against
# compromised actions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# POLICY: This workflow uses ONLY first-party GitHub-org actions
# (actions/*, github/*). No community actions. Multi-PHP matrix testing
# was traded for this constraint — we test against ubuntu-latest's
# pre-installed PHP (currently 8.3) which matches prod. Plugin's PHP
# floor (8.1) is documented in the lafka-plugin.php header and enforced
# by Requires PHP — runtime will surface syntax issues if anyone ships
# 8.4-only constructs.

jobs:
  lint-js-css:
    name: ESLint & Stylelint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          # Built-in npm cache keyed on package-lock.json hash. Cuts
          # `npm ci` install time from ~30s to ~5s on cache hit.
          cache: npm

      # `npm ci` is a reproducible install (fails on package-lock drift)
      # and is the right choice in CI; `npm install` would silently
      # mutate package-lock.json on lockfile/registry inconsistencies.
      - run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

  php:
    name: PHP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Use the runner's pre-installed PHP + Composer. No third-party
      # action required. Verify versions print so a runner-image change
      # surfaces in the log.
      - name: Show PHP + Composer versions
        run: |
          php --version
          composer --version

      # Composer cache: keyed on composer.lock so installs replay
      # offline when the lock hasn't moved.
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPCS
        run: composer phpcs

      - name: PHPUnit
        run: composer test

  # Flags any PR that introduces a new vulnerable composer or npm
  # dependency at moderate severity or above. PR-only — push events
  # have nothing to compare against.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # Single status check that all CI jobs pass. Use this in branch
  # protection rules instead of every individual matrix job.
  ci-passed:
    name: CI passed
    needs: [lint-js-css, php]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          JOBS_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$JOBS_FAILED" = "true" ]; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
