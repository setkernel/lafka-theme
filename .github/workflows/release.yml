name: Build Release Zip

on:
  push:
    tags:
      - 'v*'

# `contents: write` is required for `softprops/action-gh-release` to
# create / update the GitHub Release. No other write scopes needed.
permissions:
  contents: write

# Two `git push --tags` racing against each other (e.g. ops manually
# pushed a tag while a script was also pushing) shouldn't double-build.
# `cancel-in-progress: false` because we want both releases to publish
# — just not in parallel — if both tags are valid.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          mkdir lafka
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='.gitignore' \
                   --exclude='node_modules' \
                   --exclude='vendor' \
                   --exclude='package.json' \
                   --exclude='package-lock.json' \
                   --exclude='composer.json' \
                   --exclude='composer.lock' \
                   --exclude='.phpcs.xml.dist' \
                   --exclude='.stylelintrc.json' \
                   --exclude='eslint.config.mjs' \
                   --exclude='README.md' \
                   --exclude='LICENSE' \
                   ./ lafka/
          zip -r lafka.zip lafka/

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: lafka.zip
          fail_on_unmatched_files: true
