name: Build Release Zip

on:
  push:
    tags:
      - 'v*'

# `contents: write` is required so the gh CLI can create / update the
# GitHub Release. No other write scopes needed.
permissions:
  contents: write

# Two `git push --tags` racing against each other (e.g. ops manually
# pushed a tag while a script was also pushing) shouldn't double-build.
# `cancel-in-progress: false` because we want both releases to publish
# — just not in parallel — if both tags are valid.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# POLICY: First-party GitHub-org actions only (actions/*, github/*).
# Release publishing uses the pre-installed `gh` CLI on the runner —
# no third-party release action.

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Minify-only dist step (NX1-10b): regenerate the .min.css / .min.js
      # siblings the runtime switch (incl/system/asset-min.php) serves in
      # production. These are git-ignored build artefacts, so they only exist
      # after `npm run build` runs here — the rsync below must copy them into
      # the zip (it excludes node_modules/vendor/tooling, never the .min files).
      # First-party actions only; mirrors ci.yml's Node setup.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build minified assets
        run: npm run build

      - name: Build zip
        run: |
          mkdir lafka
          # NX1-10d: dev-only files must never ship in the installable zip.
          # Excluded: VCS/CI metadata, dependencies, package manifests, lint +
          # phpunit + playwright + wp-env tooling, the test suite, the build
          # scripts (already run in the step above), and the contributor/design
          # docs. Runtime assets STAY — the freshly-built .min siblings, the
          # store/demo one-click importer, readme.txt, languages/, theme.json.
          # `readme.md` is the GitHub project readme (dev-only); the lowercase
          # exclude is required because `README.md` does not match it on the
          # case-sensitive Linux runner.
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='.gitignore' \
                   --exclude='.githooks' \
                   --exclude='.npmrc' \
                   --exclude='.wp-env*.json' \
                   --exclude='node_modules' \
                   --exclude='vendor' \
                   --exclude='package.json' \
                   --exclude='package-lock.json' \
                   --exclude='composer.json' \
                   --exclude='composer.lock' \
                   --exclude='.phpcs.xml.dist' \
                   --exclude='.stylelintrc.json' \
                   --exclude='eslint.config.mjs' \
                   --exclude='phpunit.xml.dist' \
                   --exclude='.phpunit.result.cache' \
                   --exclude='playwright.config.js' \
                   --exclude='tests' \
                   --exclude='scripts' \
                   --exclude='CONTRIBUTING.md' \
                   --exclude='DESIGN_SYSTEM.md' \
                   --exclude='docs' \
                   --exclude='README.md' \
                   --exclude='readme.md' \
                   --exclude='LICENSE' \
                   ./ lafka/
          zip -r lafka.zip lafka/

      # Integrity check operators can verify with `sha256sum -c`.
      # Both files are uploaded to the GitHub Release.
      - name: Generate SHA256 checksum
        run: |
          sha256sum lafka.zip > lafka.zip.sha256
          cat lafka.zip.sha256

      # Idempotent release publish via the pre-installed `gh` CLI.
      # Race-free: create-tolerated + upload-clobber covers all states
      # (release missing, release exists, partial assets, re-runs). No
      # check-then-act window where a concurrent manual `gh release create`
      # can wedge the workflow.
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" \
            lafka.zip \
            lafka.zip.sha256 \
            --clobber
