name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  schedule:
    # Mondays at 06:00 UTC — runs even on quiet weeks so CodeQL DB stays fresh
    # and new advisories get flagged within the week.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    # JS analysis ~5 min, PHP analysis can run 15-25 min on a WP plugin/theme
    # of this size. Cap at 45 to catch a hung scanner without flapping.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # PHP added 2026-04-29: roughly half the codebase is PHP and CodeQL's
        # PHP queries find taint flows that PHPCS can't (file_get_contents →
        # output without escape, prepared-statement bypasses, etc.).
        language: [javascript-typescript, php]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
