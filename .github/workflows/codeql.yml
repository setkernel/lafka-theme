name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  schedule:
    # Mondays at 06:00 UTC — runs even on quiet weeks so CodeQL DB stays fresh
    # and new advisories get flagged within the week.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    # JS-only analysis ~5 min on a codebase this size; cap at 30 to catch
    # a hung scanner. PHP is NOT a CodeQL-supported language
    # (https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/),
    # so PHP source-quality checks live in the `php` job in ci.yml (PHPCS).
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
