# Dependabot configuration.
#
# Three ecosystems: composer, npm, github-actions. All bumps grouped:
# minor + patch updates collapse into one weekly PR per ecosystem; major
# bumps get their own PR so the maintainer reviews each carefully.
#
# Security advisories still arrive as separate PRs even when they're a
# patch — we never want to delay a security fix for batching.
#
# All groups capped at 5 open PRs to keep the queue manageable. Bumps
# land on main; CI gates them automatically. Auto-merge is NOT enabled;
# the operator merges after review.

version: 2
updates:
  # Composer (PHPCS / WPCS / PHPCompatibility / PHPUnit / Brain Monkey).
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Halifax'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - composer
    groups:
      composer-minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]

  # NPM (ESLint flat config + Stylelint + @wordpress/* configs). Same
  # grouping rationale as composer.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Halifax'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]

  # GitHub Actions: weekly bumps. Dependabot will gradually convert
  # tag-pinned refs (@v6) to SHA-pinned refs with version comments —
  # supply-chain hardening at no maintenance cost.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Halifax'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]
